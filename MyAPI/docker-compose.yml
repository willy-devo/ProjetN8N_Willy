    command: mock -h 0.0.0.0 -p 4013 /openapi/hr.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4013:4013"
    networks:
      - api-network

  # --- Service Logistics ---
  mock-logistics:
    image: stoplight/prism:4
    container_name: prism-logistics
    command: mock -h 0.0.0.0 -p 4014 /openapi/logistics.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4014:4014"
    networks:
      - api-network

  # --- Service Sales ---
  mock-sales:
    image: stoplight/prism:4
    container_name: prism-sales
    command: mock -h 0.0.0.0 -p 4015 /openapi/sales.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4015:4015"
    networks:
      - api-network

# Définition du réseau commun
networks:
  api-network:
    driver: bridge