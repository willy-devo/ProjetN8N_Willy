services:
  # --- Service Inventory ---
  mock-inventory:
    image: stoplight/prism:4
    container_name: prism-inventory
    command: mock -h 0.0.0.0 -p 4010 /openapi/inventory.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4010:4010"
    networks:
      - api-network

  # --- Service Customers ---
  mock-customers:
    image: stoplight/prism:4
    container_name: prism-customers
    command: mock -h 0.0.0.0 -p 4011 /openapi/customers.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4011:4011"
    networks:
      - api-network

  # --- Service Finance ---
  mock-finance:
    image: stoplight/prism:4
    container_name: prism-finance
    command: mock -h 0.0.0.0 -p 4012 /openapi/finance.yaml --dynamic
    volumes:
      - ./catalog/openapi:/openapi:ro
    ports:
      - "4012:4012"
    networks:
      - api-network

  # --- Service HR ---
  mock-hr:
    image: stoplight/prism:4
